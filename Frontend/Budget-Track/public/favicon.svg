<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="50%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="rgba(37,99,235,0.35)"/>
    </filter>
  </defs>
  <!-- Rounded square background matching .profile-avatar border-radius:12px -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#avatarGrad)" filter="url(#shadow)"/>
  <!-- Bold white initials BT -->
  <text
    x="50" y="50"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Segoe UI', system-ui, Arial, sans-serif"
    font-size="40"
    font-weight="700"
    fill="white"
    letter-spacing="1">BT</text>
</svg>
