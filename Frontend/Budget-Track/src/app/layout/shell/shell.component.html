<div class="app-shell d-flex vh-100 overflow-hidden">
    <!-- Sidebar -->
    <app-sidebar [collapsed]="sidebarCollapsed()" (toggleCollapse)="sidebarCollapsed.set(!sidebarCollapsed())" />

    <!-- Main content area -->
    <div class="main-area d-flex flex-column flex-grow-1 overflow-hidden">
        <!-- Top Navbar -->
        <app-navbar (toggleSidebar)="sidebarCollapsed.set(!sidebarCollapsed())" />

        <!-- Page content -->
        <main id="main-content" tabindex="-1" class="page-content flex-grow-1 overflow-auto p-3 bg-app">
            <router-outlet />
        </main>
    </div>
</div>

<!-- Global Toast notifications -->
<app-toast-container />
